
        <!-- Topbar Start -->
        <header class="navbar-header">
            <div class="page-container topbar-menu">
                <div class="d-flex align-items-center gap-2">

                    <div class="app-header-brand" [attr.aria-label]="'auth.brandName' | translate">
                        <span class="app-header-brand-mark">
                            <i class="ti ti-calendar-check"></i>
                        </span>
                        <span class="app-header-brand-name">{{ 'auth.brandName' | translate }}</span>
                    </div>

                    <!-- Sidebar Mobile Button -->
                    <a id="mobile_btn" class="mobile-btn" href="javascript:void(0);" (click)="toggleMobileSideBar()">
                        <i class="ti ti-menu-deep fs-24"></i>
                    </a>

                    <button class="sidenav-toggle-btn btn border-0 p-0 active" id="toggle_btn2" (click)="settings.togglehidden()"> 
                        <i class="ti ti-arrow-right"></i>
                    </button> 
					
                </div>

                <div class="d-flex align-items-center">

                    <!-- Appointment Requests -->
                    <div class="header-item d-none d-sm-flex me-2">
                        <a [routerLink]="routes.appointmentRequests" class="topbar-link btn btn-icon" [title]="'appointmentRequests.title' | translate" [attr.aria-label]="'appointmentRequests.title' | translate">
                            <i class="ti ti-calendar-question fs-16"></i>
                        </a>
                    </div>

					<!-- User Dropdown -->
					<div class="dropdown profile-dropdown d-flex align-items-center justify-content-center">
                        <a href="javascript:void(0);" class="topbar-link dropdown-toggle drop-arrow-none position-relative" data-bs-toggle="dropdown" data-bs-offset="0,22" aria-haspopup="false" aria-expanded="false">
                            <img src="assets/img/users/user-01.jpg" width="32" class="rounded-circle d-flex" alt="user-image">
                            <span class="online text-success"><i class="ti ti-circle-filled d-flex bg-white rounded-circle border border-1 border-white"></i></span>
                        </a>
                        <div class="dropdown-menu dropdown-menu-end dropdown-menu-md p-2">
                            <div class="d-flex align-items-center bg-light rounded-3 p-2 mb-2">
                                <img src="assets/img/users/user-01.jpg" class="rounded-circle" width="42" height="42" alt="">
                                <div class="ms-2">
                                    <p class="fw-medium text-dark mb-0 text-truncate">{{ accountAlias }}</p>
                                </div>
                            </div>

                            <div class="account-menu-controls">
                                <button type="button" class="dropdown-item account-control-item rounded-1" (click)="toggleTheme()">
                                    <span class="d-inline-flex align-items-center gap-2">
                                        <i class="ti fs-16" [ngClass]="themeColor==='dark'?'ti-sun':'ti-moon'"></i>
                                        <span>{{ 'account.theme' | translate }}</span>
                                    </span>
                                    <span class="form-check form-switch m-0">
                                        <input class="form-check-input m-0" type="checkbox" [checked]="themeColor === 'dark'" tabindex="-1" aria-hidden="true">
                                    </span>
                                </button>
                                <div class="dropdown-item account-control-item rounded-1">
                                    <span class="d-inline-flex align-items-center gap-2">
                                        <i class="ti ti-language fs-16"></i>
                                        <span>{{ 'account.language' | translate }}</span>
                                    </span>
                                    <span class="btn-group btn-group-sm" role="group" [attr.aria-label]="'account.language' | translate">
                                        @for(language of languageOptions; track language){
                                        <button
                                            type="button"
                                            class="btn"
                                            [ngClass]="language === currentLanguage ? 'btn-primary' : 'btn-white border'"
                                            (click)="setLanguage(language); $event.stopPropagation()"
                                        >
                                            {{ language.toUpperCase() }}
                                        </button>
                                        }
                                    </span>
                                </div>
                            </div>

                            <div class="border-top my-2"></div>

                            <!-- Item-->
                            <a [routerLink]="routes.myAccount" class="dropdown-item">
                                <i class="ti ti-user-circle me-1 align-middle"></i>
                                <span class="align-middle">{{ 'account.settings' | translate }}</span>
                            </a>

                                        
                            
                            <!-- Item-->
                            <div class="pt-2 mt-2 border-top">
                                <a href="javascript:void(0);" (click)="logout()" class="dropdown-item text-danger">
                                    <i class="ti ti-logout me-1 fs-17 align-middle"></i>
                                    <span class="align-middle">{{ 'account.logout' | translate }}</span>
                                </a>
                            </div>
                        </div>
                    </div>
						
                </div>
            </div>
        </header>
        <!-- Topbar End -->
