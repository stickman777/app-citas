<div class="main-wrapper" [ngClass]="{
    'expand-menu': expandMenu === 'true' && miniSidebar === 'true',
    'mini-sidebar': miniSidebar === 'true',
    'slide-nav': mobileSidebar === 'true'
}">
    <app-header></app-header>
    <app-sidebar></app-sidebar>

    <div class="page-wrapper">
        <router-outlet></router-outlet>
    </div>
    <div class="sidebar-overlay" [ngClass]="{
  opened: mobileSidebar === 'true',
  'd-none':mobileSidebar === 'false'
}"></div>

    <app-layout
        [hidden]="base==='layout-default'||base==='layout-hidden'||base==='layout-mini'||base==='layout-full-width'||base==='layout-rtl'||base==='layout-dark'"></app-layout>
    <app-modal></app-modal>
</div>
