<!-- Begin Wrapper -->
<div class="auth-bg auth-bg-custom position-relative overflow-hidden">

	<!-- Start Content -->
	<div class="container-fuild position-relative z-1">
		<div class="w-100 overflow-hidden position-relative flex-wrap d-block vh-100">

			<!-- start row -->
			<div class="row justify-content-center align-items-center vh-100 overflow-auto flex-wrap py-3">
				<div class="col-lg-4 mx-auto">
					<form (ngSubmit)="login()" class="d-flex justify-content-center align-items-center">
						<div class="d-flex flex-column justify-content-lg-center p-4 p-lg-0 pb-0 flex-fill">
							<div class=" mx-auto mb-4 text-center">
								<img src="assets/img/logo.svg" class="img-fluid" alt="Logo">
							</div>
							<div class="card border-1 p-lg-3 shadow-md rounded-3 mb-4">
								<div class="card-body">
									<div class="text-center mb-3">
										<h5 class="mb-1 fs-20 fw-bold">{{ 'auth.signIn' | translate }}</h5>
										<p class="mb-0">{{ 'auth.subtitle' | translate }}</p>
									</div>
									<div class="mb-3">
										<label class="form-label">{{ 'auth.email' | translate }}</label>
										<div class="input-group">
											<span class="input-group-text border-end-0 bg-white">
												<i class="ti ti-mail fs-14 text-dark"></i>
											</span>
											<input type="email" name="email" [(ngModel)]="email" class="form-control border-start-0 ps-0"
												[placeholder]="'auth.emailPlaceholder' | translate" autocomplete="email" required>
										</div>
									</div>
									<div class="mb-3">
										<label class="form-label">{{ 'auth.password' | translate }}</label>
										<div class="position-relative">
											<div class="pass-group input-group position-relative border rounded">
												<span class="input-group-text bg-white border-0">
													<i class="ti ti-lock text-dark fs-14"></i>
												</span>
												<input name="password" [(ngModel)]="password" [type]="passwordClass?'text':'password'"
													class="pass-input form-control ps-0 border-0"
													placeholder="****************" autocomplete="current-password" required>
												<span class="input-group-text bg-white border-0">
													<i class="ti toggle-password  text-dark fs-14"
														[ngClass]="passwordClass?'ti-eye':'ti-eye-off'"
														(click)="togglePassword()"></i>
												</span>
											</div>
										</div>
									</div>
									<div class="d-flex align-items-center justify-content-between mb-3">
										<div class="d-flex align-items-center">
											<div class="form-check form-check-md mb-0">
												<input class="form-check-input" id="remember_me" type="checkbox">
												<label for="remember_me"
													class="form-check-label mt-0 text-dark">{{ 'auth.rememberMe' | translate }}</label>
											</div>
										</div>
									</div>
									@if(errorMessage){
									<div class="alert alert-danger py-2 mb-3" role="alert">
										{{ errorMessage }}
									</div>
									}
									<div class="mb-2">
										<button type="submit" class="btn bg-primary text-white w-100" [disabled]="isLoading">
											{{ (isLoading ? 'auth.loggingIn' : 'auth.login') | translate }}
										</button>
									</div>
								</div><!-- end card body -->
							</div><!-- end card -->
						</div>
					</form>
				</div><!-- end col -->
			</div>
			<!-- end row -->
		</div>
	</div>
	<!-- End Content -->
</div>
<!-- End Wrapper -->
